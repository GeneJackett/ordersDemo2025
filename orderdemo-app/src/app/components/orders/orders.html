<div class ="flex-container">
<div class="flex-item-left">
<div class="table-wrapper">
<h1 style="padding: 10px;">Orders</h1>
<button (click)="filterOrders()">Search</button>
<input type="text" placeholder="Enter Customer ID" [(ngModel)]="customerIdInput" [ngModelOptions]="{standalone:true}"/>
<button>Refresh</button>


<table mat-table [dataSource]="orders" class="mat-elevation-z8 table-wrapper">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="customerId">
    <th mat-header-cell *matHeaderCellDef> Customer ID </th>
    <td mat-cell *matCellDef="let element"> {{element.customerId}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="orderId">
    <th mat-header-cell *matHeaderCellDef> Order ID </th>
    <td mat-cell *matCellDef="let element"> {{element.orderId}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="totalSaleAmount">
    <th mat-header-cell *matHeaderCellDef> Total Amount </th>
    <td mat-cell *matCellDef="let element">${{element.totalSaleAmount}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="orderDate">
    <th mat-header-cell *matHeaderCellDef> Order Date </th>
    <td mat-cell *matCellDef="let element"> {{element.orderDate}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
</div>
</div>
<div class="flex-item-right">
<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
<div class="form-vertical-container">
  <mat-form-field appearance="outline">
    <mat-label>Customer ID</mat-label>
    <input matInput placeholder="Customer ID" formControlName="customerId">
    <mat-hint>All CAPS</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Order ID</mat-label>
    <input matInput placeholder="Order ID" formControlName="orderId">
    <mat-hint>All CAPS</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Total Sale Amount</mat-label>
    <input matInput placeholder="Total Sale Amount" formControlName="totalSaleAmount">
    <mat-hint>$10.00</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Order Date</mat-label>
    <input matInput placeholder="Order Date" formControlName="orderDate">
    <mat-hint>yyyy-MM-dd HH:mm:ss</mat-hint>
  </mat-form-field>
  <button mat-raised-button color="primary" type="submit">Submit</button>
</div>
</form>
</div>
</div>
