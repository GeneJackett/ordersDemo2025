<div class ="flex flex-col md:flex-row gap-6 pt-5">
<div class="border rounded-2xl w-full md:w-1/2 ml-2">
<h1 class="text-6xl text-emerald-950">Orders</h1>
<div class="flex p-3 gap-3 justify-center ">
  <button matButton="elevated" class="top-2" (click)="filterOrders()">Search</button>
  <mat-form-field appearance="outline">
    <mat-label>Input</mat-label>
    <input matInput class="" type="text" placeholder="Enter Customer ID" [(ngModel)]="customerIdInput" [ngModelOptions]="{standalone:true}"/>
  </mat-form-field>
  <button matButton="elevated" class="top-2" (click)="refresh()">Refresh</button>
</div>
<table mat-table [dataSource]="orders" class="mat-elevation-z8 mb-3">

  <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

  <!-- Position Column -->
  <ng-container matColumnDef="customerId">
    <th mat-header-cell *matHeaderCellDef>Customer ID</th>
    <td mat-cell *matCellDef="let element"> {{element.customerId}} </td>
  </ng-container>

  <!-- Name Column -->
  <ng-container matColumnDef="orderId">
    <th mat-header-cell *matHeaderCellDef> Order ID </th>
    <td mat-cell *matCellDef="let element"> {{element.orderId}} </td>
  </ng-container>

  <!-- Weight Column -->
  <ng-container matColumnDef="totalSaleAmount">
    <th mat-header-cell *matHeaderCellDef> Total Amount </th>
    <td mat-cell *matCellDef="let element">${{element.totalSaleAmount}} </td>
  </ng-container>

  <!-- Symbol Column -->
  <ng-container matColumnDef="orderDate">
    <th mat-header-cell *matHeaderCellDef> Order Date </th>
    <td mat-cell *matCellDef="let element"> {{element.orderDate}} </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
</div>
<div class="flex md:w-1/2 ml-2">
<form [formGroup]="myForm" (ngSubmit)="onSubmit()">
<div class="flex flex-col gap-4">
  <mat-form-field appearance="outline">
    <mat-label>Customer ID</mat-label>
    <input matInput placeholder="Enter Customer ID" formControlName="customerId">
    <mat-hint>All CAPS</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Order ID</mat-label>
    <input matInput placeholder="Enter Order ID" formControlName="orderId">
    <mat-hint>All CAPS</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Total Sale Amount</mat-label>
    <input matInput placeholder="Enter Sale Amount" formControlName="totalSaleAmount">
    <mat-hint>$10.00</mat-hint>
  </mat-form-field>
    <mat-form-field appearance="outline">
    <mat-label>Order Date</mat-label>
    <input matInput placeholder="Enter Order Date" formControlName="orderDate">
    <mat-hint>yyyy-MM-dd HH:mm:ss</mat-hint>
  </mat-form-field>
  <button class="border" mat-raised-button color="primary" type="submit">Submit</button>
</div>
</form>
</div>
</div>
